kind = "web"
previewPath = "/"
title = "منصة مهارات الإعلام الرقمي"
version = "1.0.0"
id = "artifacts/digital-media-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20157

[services.development]
run = "pnpm --filter @workspace/digital-media-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-media-platform", "run", "build" ]
publicDir = "artifacts/digital-media-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20157"
BASE_PATH = "/"
